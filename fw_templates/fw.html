<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firewall — SalleTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f14;
      --bg2:       #141820;
      --bg3:       #1c2230;
      --border:    #2a3347;
      --text:      #c8d0e0;
      --text-dim:  #5c6880;
      --text-hi:   #e8edf8;
      --accent:    #3b82f6;
      --accent2:   #22d3a5;
      --danger:    #ef4444;
      --ok:        #22c55e;
      --font:      'IBM Plex Sans', sans-serif;
      --mono:      'IBM Plex Mono', monospace;
      --radius:    6px;
      --radius-lg: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 48px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .topbar-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text-hi); letter-spacing: .04em; }
    .topbar-logo span { color: var(--accent2); }
    .topbar-badge {
      background: rgba(34,211,165,.12); border: 1px solid rgba(34,211,165,.25);
      color: var(--accent2); font-family: var(--mono); font-size: 10px;
      padding: 2px 8px; border-radius: 20px; letter-spacing: .05em;
    }
    .topbar-sep { flex: 1; }
    .topbar-clock { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }

    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Page header ── */
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
    .page-title  { font-size: 20px; font-weight: 600; color: var(--text-hi); }
    .page-sub    { font-size: 12px; color: var(--text-dim); margin-top: 3px; font-family: var(--mono); }

    /* ── Status banner ── */
    .status-banner {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 11px 18px; margin-bottom: 20px;
      font-family: var(--mono); font-size: 12px; color: var(--text-dim);
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .dot.ok    { background: var(--ok);    box-shadow: 0 0 6px var(--ok); }
    .dot.error { background: var(--danger); }
    .sep { color: var(--border); }

    /* ── Stat cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card  { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
    .stat-label { font-size: 11px; font-family: var(--mono); letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-family: var(--mono); font-weight: 500; color: var(--text-hi); line-height: 1; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.ok     { color: var(--ok); }

    /* ── Table ── */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .table-toolbar-title { font-size: 13px; font-weight: 500; color: var(--text-hi); flex: 1; }
    .filter-select {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--mono); font-size: 12px;
      padding: 5px 10px; outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 11px; font-family: var(--mono);
      letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid rgba(42,51,71,.5); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg3); }
    td { padding: 11px 14px; font-size: 13px; color: var(--text); vertical-align: middle; }
    td.mono { font-family: var(--mono); font-size: 12px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-family: var(--mono); font-weight: 500; }
    .badge-active   { background: rgba(34,197,94,.12);  color: var(--ok);      border: 1px solid rgba(34,197,94,.25); }
    .badge-en-cours { background: rgba(34,211,165,.15); color: var(--accent2); border: 1px solid rgba(34,211,165,.3); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,211,165,.3); } 50% { box-shadow: 0 0 0 4px rgba(34,211,165,0); } }

    /* ── URL pills ── */
    .url-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .url-pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; font-size: 11px; font-family: var(--mono); color: var(--accent); white-space: nowrap; }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius);
      border: 1px solid var(--border); background: transparent; color: var(--text);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.15); }

    /* ── Empty / loading ── */
    .empty   { padding: 40px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
    .loading { padding: 32px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
    .loading::after {
      content: ''; display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast {
      background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--accent);
      border-radius: var(--radius); padding: 10px 16px; font-size: 13px; color: var(--text-hi);
      box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: slide-in .2s ease;
    }
    .toast.error { border-left-color: var(--danger); }
    @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">Salle<span>TP</span></div>
  <span class="topbar-badge">API2 · Firewall</span>
  <div class="topbar-sep"></div>
  <div class="topbar-clock" id="topbar-clock">—</div>
</header>

<div class="main">

  <div class="page-header">
    <div>
      <div class="page-title">Simulateur Firewall</div>
      <div class="page-sub">règles chargées en mémoire · port 5001</div>
    </div>
    <button class="btn" id="btn-reload">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13.5 8A5.5 5.5 0 112 8M13.5 4.5V8h-3.5"/>
      </svg>
      Rafraîchir
    </button>
  </div>

  <div class="status-banner">
    <span class="dot" id="fw-dot"></span>
    <span id="fw-status-text">connexion…</span>
    <span class="sep">·</span>
    <span id="fw-mem">—</span>
    <span class="sep">·</span>
    <span id="fw-active-count">—</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Règles en mémoire</div>
      <div class="stat-value accent" id="stat-mem">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">En cours</div>
      <div class="stat-value ok" id="stat-en-cours">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Heure locale</div>
      <div class="stat-value" style="font-size:16px;color:var(--text-hi)" id="stat-heure">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-toolbar">
      <div class="table-toolbar-title">Règles firewall</div>
      <select class="filter-select" id="filter-active">
        <option value="0">toutes les règles</option>
        <option value="1">en cours uniquement</option>
      </select>
    </div>
    <div id="rules-wrap"><div class="loading">chargement</div></div>
  </div>

</div>

<div id="toast-container"></div>

<script>
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function urlPills(urls) {
  if (!urls || !urls.length) return '<span style="color:var(--text-dim);font-size:11px">—</span>';
  return `<div class="url-list">${urls.map(u => `<span class="url-pill">${u.lien}</span>`).join('')}</div>`;
}

async function loadStatus() {
  try {
    const r = await fetch('/fw/status');
    const s = await r.json();
    document.getElementById('fw-dot').className         = 'dot ok';
    document.getElementById('fw-status-text').textContent = 'en ligne';
    document.getElementById('fw-mem').textContent          = `${s.regles_en_memoire} règle(s) en mémoire`;
    document.getElementById('fw-active-count').textContent = `${s.regles_actives} en cours`;
    document.getElementById('topbar-clock').textContent    = s.heure_courante;
    document.getElementById('stat-mem').textContent        = s.regles_en_memoire;
    document.getElementById('stat-en-cours').textContent   = s.regles_actives;
    document.getElementById('stat-heure').textContent      = s.heure_courante.slice(11);
  } catch {
    document.getElementById('fw-dot').className          = 'dot error';
    document.getElementById('fw-status-text').textContent = 'erreur';
    ['fw-mem','fw-active-count','stat-mem','stat-en-cours','stat-heure']
      .forEach(id => document.getElementById(id).textContent = '—');
  }
}

async function loadRules() {
  const only  = document.getElementById('filter-active').value;
  const wrap  = document.getElementById('rules-wrap');
  wrap.innerHTML = '<div class="loading">chargement</div>';
  try {
    const r     = await fetch(`/fw/rules?active=${only}`);
    const rules = await r.json();
    if (!rules.length) { wrap.innerHTML = '<div class="empty">aucune règle chargée</div>'; return; }
    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Salle</th><th>VLAN</th><th>Enseignant</th>
          <th>Date</th><th>Horaire</th><th>URLs autorisées</th><th>Statut</th>
        </tr></thead>
        <tbody>
          ${rules.map(rule => `<tr>
            <td class="mono">${rule.id_config}</td>
            <td>${rule.salle}</td>
            <td class="mono">${rule.id_vlan}</td>
            <td>${rule.enseignant}</td>
            <td class="mono">${rule.date_config}</td>
            <td class="mono">${rule.heure_debut}–${rule.heure_fin}</td>
            <td>${urlPills(rule.urls)}</td>
            <td>${rule.en_cours
              ? '<span class="badge badge-en-cours">● en cours</span>'
              : '<span class="badge badge-active">active</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    wrap.innerHTML = `<div class="empty">erreur — ${e.message}</div>`;
  }
}

async function loadPageData() { await Promise.all([loadStatus(), loadRules()]); }

document.getElementById('filter-active').addEventListener('change', loadRules);
document.getElementById('btn-reload').addEventListener('click', () => { loadPageData(); toast('Actualisation…'); });

loadPageData();
setInterval(loadPageData, 15000);
</script>
</body>
</html>
