<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SalleTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0f14;
      --bg2:      #141820;
      --bg3:      #1c2230;
      --border:   #2a3347;
      --text:     #c8d0e0;
      --text-dim: #5c6880;
      --text-hi:  #e8edf8;
      --accent:   #3b82f6;
      --accent2:  #22d3a5;
      --danger:   #ef4444;
      --font:     'IBM Plex Sans', sans-serif;
      --mono:     'IBM Plex Mono', monospace;
      --radius:   6px;
      --radius-lg:10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 360px;
      max-width: 95vw;
    }

    .login-logo {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text-hi);
      letter-spacing: .04em;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent2); }

    .login-sub {
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
    }

    .form-row { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-hi);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }

    .error-msg {
      display: none;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 12px;
      font-family: var(--mono);
      padding: 8px 12px;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s;
    }
    .btn-login:hover   { filter: brightness(1.1); }
    .btn-login:active  { filter: brightness(.92); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">Salle<span>TP</span></div>
  <div class="login-sub">gestion firewall · BTS CIEL IR 2026</div>

  <div class="login-card">
    <div class="form-row">
      <label>Email</label>
      <input type="email" id="f-email" placeholder="matt@labmatt.local" autofocus>
    </div>
    <div class="form-row">
      <label>Mot de passe</label>
      <input type="password" id="f-pwd" placeholder="••••••••">
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="btn-login" id="btn-login">Se connecter</button>
  </div>
</div>

<script>
async function doLogin() {
  const email = document.getElementById('f-email').value.trim();
  const pwd   = document.getElementById('f-pwd').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('error-msg');

  err.classList.remove('visible');
  btn.disabled = true;
  btn.textContent = 'Connexion…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, mot_de_passe: pwd })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erreur');
    window.location.href = '/';
  } catch(e) {
    err.textContent = e.message;
    err.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('f-pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('f-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('f-pwd').focus();
});
</script>
</body>
</html>
